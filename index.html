<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SigmaNation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">Σ SIGMANATION</div>

    <nav>
      <a href="#">Özellikler</a>
      <a href="#">Sıralama</a>
      <a href="#">Seviyeler</a>
      <a href="#">Etkinlikler</a>
      <a href="#">Topluluk</a>
    </nav>

    <div class="actions">
      <button class="ghost">Giriş Yap</button>
      <button class="primary">Katıl</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="badge">Türkiye'nin #1 Geometry Dash Topluluğu</div>

    <h1>
      GEOMETRY DASH <br>
      <span>SIGMANATION</span>
    </h1>

    <p>
      Rekorları kır, seviyeleri fethet, efsane ol.
      Sigmanation ile GD dünyasında yeni bir çağ başlıyor.
    </p>

    <div class="buttons">
      <button class="primary">Topluluğa Katıl</button>
      <button class="secondary">Discord Sunucusu</button>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div>
        <h2>12.847</h2>
        <p>Üye</p>
      </div>
      <div>
        <h2>3.420</h2>
        <p>Seviye</p>
      </div>
      <div>
        <h2>89.542</h2>
        <p>Tamamlama</p>
      </div>
      <div>
        <h2>156</h2>
        <p>Etkinlik</p>
      </div>
    </div>

  </section>

</body>
</html>
