<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>SigmaNation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">SIGMANATION</div>

    <nav>
      <a href="#features">Özellikler</a>
      <a href="#leaderboard">Sıralama</a>
      <a href="#events">Seviyeler</a>
      <a href="#community">Topluluk</a>
    </nav>

    <div class="actions">
      <button onclick="goDiscord()">Giriş Yap</button>
      <button class="primary" onclick="goJoin()">Katıl</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <p class="badge">Türkiye'nin #1 Geometry Dash Topluluğu</p>

    <h1>
      GEOMETRY DASH<br>
      <span>SIGMANATION</span>
    </h1>

    <p class="desc">
      Rekorları kır, seviyeleri fethet, efsane ol.
    </p>

    <div class="buttons">
      <button class="primary" onclick="goJoin()">Topluluğa Katıl</button>
      <button onclick="goDiscord()">Discord Sunucusu</button>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div><h2>12.847</h2><p>Üye</p></div>
      <div><h2>3.420</h2><p>Seviye</p></div>
      <div><h2>89.542</h2><p>Tamamlama</p></div>
      <div><h2>156</h2><p>Etkinlik</p></div>
    </div>
  </section>

  <!-- SECTIONS -->
  <section id="features">
    <h2>Özellikler</h2>
  </section>

  <section id="leaderboard">
    <h2>Sıralama</h2>
  </section>

  <section id="events">
    <h2>Seviyeler</h2>
  </section>

  <section id="community">
    <h2>Topluluk</h2>
  </section>

  <script src="script.js"></script>
</body>
</html>
