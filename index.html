<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sigmanation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at top, #0b0f2a, #050816);
      overflow-x: hidden;
    }

    /* Soft constant glow */
    .glow {
      text-shadow: 0 0 6px rgba(0,255,255,0.4), 0 0 12px rgba(0,255,255,0.25);
    }

    @keyframes pulse {
      from { text-shadow: 0 0 10px rgba(0,255,255,0.5); }
      to { text-shadow: 0 0 25px rgba(0,255,255,1); }
    }

    /* Floating animation */
    .float {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Fade in */
    .fade-in {
      animation: fadeIn 1.5s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body class="text-white font-sans">

  <!-- Navbar -->
  <header class="flex justify-between items-center px-10 py-5">
    <div class="text-xl font-bold glow">Σ SIGMANATION</div>
    <nav class="space-x-6 text-gray-300">
      <a href="#" class="hover:text-white transition">Özellikler</a>
      <a href="#" class="hover:text-white transition">Sıralama</a>
      <a href="#" class="hover:text-white transition">Seviyeler</a>
      <a href="#" class="hover:text-white transition">Etkinlikler</a>
      <a href="#" class="hover:text-white transition">Topluluk</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="text-center mt-20 px-6 fade-in">
    <p class="text-sm text-cyan-400 mb-3">Türkiye'nin #1 Geometry Dash Topluluğu</p>
    <h1 class="text-5xl md:text-6xl font-extrabold tracking-widest mb-4 float">
      <span class="bg-gradient-to-r from-pink-500 to-orange-400 bg-clip-text text-transparent">
        SIGMANATION
      </span>
    </h1>
    <p class="text-gray-400 max-w-xl mx-auto mb-8">
      Rekorları kır, seviyeleri fethet, efsane ol. Sigmanation ile GD dünyasında yeni bir çağ başlıyor.
    </p>

    <div class="flex justify-center gap-4">
      <button class="px-6 py-3 bg-cyan-500 text-black rounded-xl hover:scale-110 transition">Topluluğa Katıl</button>
      <button class="px-6 py-3 border border-gray-600 rounded-xl hover:bg-white hover:text-black transition">Discord Sunucusu</button>
    </div>
  </section>

  <!-- Stats -->
  <section class="flex flex-wrap justify-center gap-10 text-center mt-24 px-10 fade-in">
    
    <div class="group">
      <p class="text-5xl font-extrabold text-cyan-400 transition duration-300 group-hover:scale-125 glow">12.847</p>
      <p class="text-gray-400 text-lg tracking-wide">Üye</p>
    </div>

    <div class="group">
      <p class="text-5xl font-extrabold text-cyan-400 transition duration-300 group-hover:scale-125 glow">3.420</p>
      <p class="text-gray-400 text-lg tracking-wide">Seviye</p>
    </div>

    <div class="group">
      <p class="text-5xl font-extrabold text-cyan-400 transition duration-300 group-hover:scale-125 glow">89.542</p>
      <p class="text-gray-400 text-lg tracking-wide">Tamamlama</p>
    </div>

    <div class="group">
      <p class="text-5xl font-extrabold text-cyan-400 transition duration-300 group-hover:scale-125 glow">156</p>
      <p class="text-gray-400 text-lg tracking-wide">Etkinlik</p>
    </div>

  </section>

  <!-- Sections -->
  <section class="mt-20 px-10">
    <div id="content" class="text-center text-gray-300 fade-in">
      Bir menü seçin.
    </div>
  </section>

  <script>
    const links = document.querySelectorAll('nav a');
    const content = document.getElementById('content');

    links.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const text = link.textContent;

        content.innerHTML = `<h2 class=\"text-2xl text-white mb-2 glow\">${text}</h2>
        <p class=\"fade-in\">${text} sayfası içeriği burada olacak.</p>`;
      });
    });
  </script>

</body>
</html>
