<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sigmanation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at top, #0b0f2a, #050816);
      overflow-x: hidden;
    }

    .glow {
      text-shadow: 0 0 6px rgba(0,255,255,0.4), 0 0 12px rgba(0,255,255,0.25);
    }

    .float {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
  </style>
</head>
<body class="text-white font-sans">

  <!-- Navbar (SABİT) -->
  <header class="flex justify-between items-center px-10 py-5 backdrop-blur-md bg-white/5 border-b border-white/10">
    
    <!-- Logo -->
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 flex items-center justify-center rounded-lg bg-gradient-to-r from-cyan-400 to-blue-500 text-black font-bold">Σ</div>
      <div class="flex items-end gap-2">
        <span class="text-lg font-semibold tracking-wide text-gray-200">SIGMANATION</span>
        <span class="text-[10px] text-gray-500 mb-1">v1.0.0</span>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex gap-10 text-gray-300 text-base font-medium">
      <a href="#" data-page="home" class="nav-link hover:text-white hover:scale-110 transition duration-200">Ana Sayfa</a>
      <a href="#" data-page="ozellikler" class="nav-link hover:text-white hover:scale-110 transition duration-200">Özellikler</a>
      <a href="#" data-page="siralama" class="nav-link hover:text-white hover:scale-110 transition duration-200">Sıralama</a>
      <a href="#" data-page="seviyeler" class="nav-link hover:text-white hover:scale-110 transition duration-200">Seviyeler</a>
      <a href="#" data-page="etkinlikler" class="nav-link hover:text-white hover:scale-110 transition duration-200">Etkinlikler</a>
      <a href="#" data-page="topluluk" class="nav-link hover:text-white hover:scale-110 transition duration-200">Topluluk</a>
    </nav>

  </header>

  <!-- CONTENT (DEĞİŞEN ALAN) -->
  <main id="app"></main>

  <script>
    const app = document.getElementById("app");

    function render(page) {
      if (page === "home") {
        app.innerHTML = `
        <section class="text-center mt-16 px-6">
          <p class="text-sm text-cyan-400 mb-3">Türkiye'nin #1 Geometry Dash Topluluğu</p>
          <h1 class="text-6xl md:text-7xl font-extrabold tracking-widest mb-6 float">
            <span class="bg-gradient-to-r from-pink-500 to-orange-400 bg-clip-text text-transparent">
              SIGMANATION
            </span>
          </h1>
          <p class="text-gray-400 max-w-xl mx-auto mb-10 text-lg">
            Rekorları kır, seviyeleri fethet, efsane ol.
          </p>
        </section>

        <section class="flex justify-center gap-14 text-center mt-12">
          <div>
            <p class="text-5xl font-extrabold text-cyan-400 glow">12.847</p>
            <p class="text-gray-400">Üye</p>
          </div>
          <div>
            <p class="text-5xl font-extrabold text-cyan-400 glow">3.420</p>
            <p class="text-gray-400">Seviye</p>
          </div>
          <div>
            <p class="text-5xl font-extrabold text-cyan-400 glow">89.542</p>
            <p class="text-gray-400">Tamamlama</p>
          </div>
          <div>
            <p class="text-5xl font-extrabold text-cyan-400 glow">156</p>
            <p class="text-gray-400">Etkinlik</p>
          </div>
        </section>
                
        <section class="mt-16 px-10">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl mx-auto text-center">
            <div class="p-6 bg-white/5 rounded-2xl border border-white/10 hover:scale-105 transition">
              <h3 class="text-lg font-semibold mb-2">Hızlı Gelişim</h3>
              <p class="text-gray-400 text-sm">En iyi oyuncularla kendini geliştir.</p>
            </div>
            <div class="p-6 bg-white/5 rounded-2xl border border-white/10 hover:scale-105 transition">
              <h3 class="text-lg font-semibold mb-2">Rekabet</h3>
              <p class="text-gray-400 text-sm">Sıralamada yerini al.</p>
            </div>
            <div class="p-6 bg-white/5 rounded-2xl border border-white/10 hover:scale-105 transition">
              <h3 class="text-lg font-semibold mb-2">Topluluk</h3>
              <p class="text-gray-400 text-sm">Aktif bir oyuncu kitlesine katıl.</p>
            </div>
          </div>
        </section>
        `;
      } else {
        app.innerHTML = `
        <section class="text-center mt-28">
          <h1 class="text-4xl font-bold glow mb-4">${page.toUpperCase()}</h1>
          <p class="text-gray-400">${page} sayfası içeriği burada olacak.</p>
        </section>
        `;
      }
    }

    document.querySelectorAll(".nav-link").forEach(link => {
      link.addEventListener("click", e => {
        e.preventDefault();
        const page = link.getAttribute("data-page");
        render(page);
      });
    });

    // default
    render("home");
  </script>

</body>
</html>
